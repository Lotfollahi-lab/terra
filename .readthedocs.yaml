# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2
build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    # Install terra itself WITHOUT its runtime deps. autodoc imports the
    # package to introspect signatures/docstrings, but the heavy / GPU-only
    # deps are mocked in docs/conf.py (autodoc_mock_imports), so they need not
    # be installed -- this keeps the RTD build fast and within resource limits.
    # Runs after the docs/requirements.txt install below.
    post_install:
      - pip install . --no-deps
sphinx:
  configuration: docs/conf.py
  # Flip to true once the autosummary API pages build warning-free.
  fail_on_warning: false
python:
  install:
    - requirements: docs/requirements.txt
