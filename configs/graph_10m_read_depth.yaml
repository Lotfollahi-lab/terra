data:
  dataset_name: 'graph_10m_1024'
  raw_data_folder_path: '/lustre/scratch126/cellgen/team361/DATASETS/silver/human_cohort1_10m'
  #tokenized_data_folder_path: '/lustre/scratch126/cellgen/team361/DATASETS/gold/cell-graph-tokenizer/human_cohort1_10m/human_cohort1_10m_32_read_depth_shifted_log_knn_10_1408.dataset/'
  tokenized_data_folder_path: '/lustre/scratch126/cellgen/team361/DATASETS/gold/cell-graph-tokenizer/human_cohort1_10m/human_cohort1_10m_32_None_shifted_log_knn_10_1408.dataset/'
  tokenizer_type: 'cell_graph'
  n_special_values: 94 #7 
  random_state: 0
  sample_subset: False
  sample_size: 10000
  split: 0.0
  split_val: 0.1
  stratify: False
  
  test_batch_ids: ['1000_']
  #test_batch_ids: ['1000_batch11', '1000_batch19', '1000_batch32']
  vocab_size: 5813 # from token dictionary (‘/lustre/scratch126/cellgen/team361/DATASETS/tokenizer/cell-graph-tokenizer/mmb0-1b_smb1-1b_1p/token_dictionary.pkl’)
  seq_len_cell: 64
  seq_len_neighborhood: 640
  n_segments: 11 # number of unique segment tokens (1 index and 10 neighbor gene segments)
  sampling_strategy: null # null, ‘rand_sampling’, ‘norm_count_rank_sampling’, ‘rand_sampling_rep’, ‘norm_count_rank_sampling_rep’
  batch_size: 64
  num_workers: 24
  pin_memory: True
meta:
  gt_type: 'rank' # ‘rank’, ‘counts’
  enc_depth: 6 # 6
  enc_emb_dim: 1024
  pred_depth: 2 # 2
  pred_emb_dim: 1024
  special_tokens: ['assay', 'tissue', 'gene_panel', 'batch']
  pos_learnable: False
  seg_learnable: False
  use_bfloat16: True
  use_flash_attention: True
mask:
  n_contexts: 1
  n_targets: 5 # this is the number of blocks in block masking
  block_masking: True # this doesn’t have meaning in block masking.
  context_mask_size: 200 # this doesn’t have meaning in block masking.
  target_mask_size: 50 # this doesn’t have meaning in block masking.
  per_block_mask_ratio: 0.5 # [0.5, 0.8]
  #controlled_attention_pattern:
  #  # Similarly, for the columns, we have the same order, and a 1 indicates attention get masked  between those two parts.
  #  # ‘Matrix’, ‘null’
  #  - [0, 1, 0, 1] # cls
  #  - [0, 1, 0, 1] # genes
  controlled_attention_pattern: null
  restrict_special_attention: True # True
optimization:
  warmup: 0
  epochs: 100
  ema:
  - 0.7
  - 1.0
  start_lr: 2.0e-05
  lr: 2.0e-05
  final_lr: 2.0e-05
  weight_decay: 0.04
  final_weight_decay: 0.4
  ipe_scale: 1.0
state:
  log_freq: 20
  checkpoint_freq: 1
  write_tag: nichejepa
  read_timestamp: ''
  load_checkpoint: False # true, false
  read_checkpoint: null # null, ‘nichejepa-ep5.pth.tar’
  folder_path: null





